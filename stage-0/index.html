<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card | HNG Stage 0</title>
    <link rel="icon" href="./favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./favicon-16x16.png"
    />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 flex items-center justify-center p-4"
  >
    <article
      data-testid="test-todo-card"
      class="w-full max-w-md rounded-lg border border-gray-200 bg-white p-6 shadow-sm hover:shadow-md transition"
    >
      <!-- Header -->
      <div class="mb-4 flex items-start gap-3">
        <input
          type="checkbox"
          id="todo-checkbox"
          data-testid="test-todo-complete-toggle"
          class="mt-1 h-5 w-5 cursor-pointer rounded border-gray-300 text-blue-600 focus:ring-2 focus:ring-blue-500"
          aria-label="Mark task as complete"
        />

        <label for="todo-checkbox" class="flex-1 cursor-pointer">
          <h3
            data-testid="test-todo-title"
            id="todo-title"
            class="text-lg font-semibold text-gray-900 transition"
          >
            Complete project documentation
          </h3>
        </label>
      </div>

      <!-- Description -->
      <p
        data-testid="test-todo-description"
        class="mb-4 text-sm text-gray-600 leading-relaxed"
      >
        Write comprehensive documentation for the new API endpoints including
        examples and error handling.
      </p>

      <!-- Priority + Status -->
      <div class="mb-4 flex flex-wrap items-center gap-2">
        <span
          data-testid="test-todo-priority"
          id="priority"
          class="inline-block rounded-full border px-3 py-1 text-xs font-medium bg-red-100 text-red-800 border-red-300"
          aria-label="Priority: High"
        >
          High
        </span>

        <span
          data-testid="test-todo-status"
          id="status"
          class="text-xs font-medium text-blue-700"
        >
          In Progress
        </span>
      </div>

      <!-- Time -->
      <div class="mb-4 space-y-1 text-xs text-gray-600">
        <time
          data-testid="test-todo-due-date"
          id="due-date"
          class="block"
        ></time>

        <time
          data-testid="test-todo-time-remaining"
          id="time-remaining"
          class="block font-medium text-gray-700"
        ></time>
      </div>

      <!-- Tags -->
      <ul
        data-testid="test-todo-tags"
        role="list"
        class="mb-5 flex flex-wrap gap-2"
      >
        <li>
          <span
            data-testid="test-todo-tag-work"
            class="inline-block rounded-full bg-gray-100 px-2.5 py-1 text-xs text-gray-700"
          >
            #work
          </span>
        </li>
        <li>
          <span
            data-testid="test-todo-tag-urgent"
            class="inline-block rounded-full bg-gray-100 px-2.5 py-1 text-xs text-gray-700"
          >
            #urgent
          </span>
        </li>
      </ul>

      <!-- Actions -->
      <div class="flex gap-2 pt-4">
        <button
          data-testid="test-todo-edit-button"
          id="edit-btn"
          aria-label="Edit task"
          class="flex-1 rounded-md border px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 focus:ring-2 focus:ring-blue-500"
        >
          Edit
        </button>

        <button
          data-testid="test-todo-delete-button"
          id="delete-btn"
          aria-label="Delete task"
          class="flex-1 rounded-md border border-red-300 px-4 py-2 text-sm text-red-700 hover:bg-red-50 focus:ring-2 focus:ring-red-500"
        >
          Delete
        </button>
      </div>
    </article>

    <script src="script.js"></script>
  </body>
</html>
